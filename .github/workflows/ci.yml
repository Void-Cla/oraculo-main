name: Oraculo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo ref para economizar minutos de runner.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qualidade:
    runs-on: ubuntu-latest
    env:
      # Banco de teste isolado — nunca toca dados reais. Conta real sempre bloqueada na CI.
      DB_PATH: /tmp/ci_oraculo.sqlite
      PERMITIR_CONTA_REAL: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      # Lint/format/tipos são METAS PROGRESSIVAS: reportam, mas não bloqueiam ainda — o
      # código legado não foi escrito sob essas ferramentas. Tornar bloqueante após o
      # primeiro passe de formatação (evita um diff gigante e arriscado numa só sessão).
      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Formatação (black)
        run: black --check src/ tests/
        continue-on-error: true

      - name: Ordenação de imports (isort)
        run: isort --check-only src/ tests/
        continue-on-error: true

      - name: Tipos (mypy)
        run: mypy src/
        continue-on-error: true

      - name: Validação fail-fast de configuração
        run: python -c "from src.core.validacao_config import validar_config; assert validar_config() == [], validar_config()"

      - name: Testes
        run: pytest -q --tb=short
